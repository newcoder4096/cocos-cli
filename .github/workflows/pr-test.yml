name: PR Test

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  issue_comment:
    types: [created]

jobs:
  pr-test:
    # 运行条件：
    # 1. PR 事件
    # 2. 评论触发 (包含 "rerun pr test"，包括 "rerun pr test:debug")
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, 'rerun pr test'))
    
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{matrix.os}}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false
          persist-credentials: true
          fetch-depth: 0
          # 如果是评论触发，需要检出 PR 的代码
          ref: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: '22.17.0'
      - name: Setup configuration
        id: setup-config
        uses: ./.github/actions/setup-config
        with:
          feishu-webhook-url: ${{ secrets.FEISHU_WEBHOOK_URL }}
      
      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Generate DTS
        shell: bash
        run: npx tsx workflow/generate-dts.ts

      - name: Run unit tests
        id: unit-tests
        run: npm run test:quiet

      - name: Run DTS tests
        shell: bash
        run: |
          cp packages/engine/bin/.declarations/cc.d.ts packages/cocos-cli-types/cc.d.ts
          npx eslint --fix "./packages/cocos-cli-types/*.d.ts"
          npx jest packages/cocos-cli-types --roots="<rootDir>/packages/cocos-cli-types"

      - name: Check DTS API compatibility
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          BASE_REF="origin/${{ github.base_ref }}"
          SNAP_FILE="tests/__snapshots__/dts-snapshot.test.ts.snap"

          # Skip if snapshot file is new (not in base branch yet)
          if ! git show "$BASE_REF:$SNAP_FILE" > /dev/null 2>&1; then
            echo "Snapshot file is new, skipping API compatibility check."
            exit 0
          fi

          # Check if snapshot file changed compared to base branch
          if git diff --name-only "$BASE_REF"...HEAD | grep -q "$SNAP_FILE"; then
            if [[ "$PR_TITLE" != *"[break]"* ]]; then
              echo "::error::DTS API breaking change detected! The snapshot file changed but the PR title does not contain [break]."
              echo "::error::If this change is intentional, add [break] to your PR title."
              exit 1
            fi
            echo "API change detected and [break] tag found in PR title."
          else
            echo "No DTS API changes detected."
          fi

      - name: Run E2E tests
        id: e2e-tests
        uses: ./.github/actions/run-e2e-tests
        with:
          report-server-url: ${{ steps.setup-config.outputs.REPORT_SERVER_URL }}
          # 如果是评论触发且包含 "rerun pr test:debug"，则以 debug 模式运行 E2E
          debug: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, 'rerun pr test:debug') }}
      
      - name: Check E2E coverage
        id: coverage
        uses: ./.github/actions/check-e2e-coverage
        with:
          report-server-url: ${{ steps.setup-config.outputs.REPORT_SERVER_URL }}

